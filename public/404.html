<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect unknown paths back to index with the path stored in sessionStorage
      sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
      location.replace('/personal-web/');
    </script>
  </head>
  <body></body>
</html>
