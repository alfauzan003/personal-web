    <script>
      (function() {
        var p = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('p='); });
        if (p) {
          var path = '/' + decodeURIComponent(p.slice(2));
          var h = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('h='); });
          window.history.replaceState(null, null, path + (h ? '#' + decodeURIComponent(h.slice(2)) : ''));
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
