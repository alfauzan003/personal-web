<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Habib Al Fauzan</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the unknown path into a query string, then redirects to the app's
      // base. A snippet in index.html decodes it back before React Router boots.
      (function () {
        var segmentCount = 1; // number of path segments to keep as the base (/personal-web)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
